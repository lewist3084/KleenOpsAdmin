name: kleenops_admin
description: "Kleenops platform admin — cross-company oversight and management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  cloud_functions: ^6.0.0
  firebase_app_check: ^0.4.1+3
  firebase_crashlytics: ^5.0.0

  # State & navigation
  riverpod: ^3.0.0
  flutter_riverpod: ^3.0.0
  go_router: ^17.0.1

  # Charts
  syncfusion_flutter_charts: ^31.1.18

  # Shared UI
  shared_widgets:
    path: ../shared_widgets

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1

  # Localization
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
